on:
  push:
    branches:
    - main
  pull_request:
name: tests
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm install
    - run: npm test
    strategy:
      matrix:
        node-version:
        - "22"
        - "24"
